<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Tap Pro - Final</title>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0d0e15; color: white; font-family: sans-serif; text-align: center; padding: 10px; }
        .card { background: #1c1f2e; padding: 15px; border-radius: 15px; margin: 10px 0; border: 1px solid #333; }
        .btn { padding: 12px; width: 100%; background: #6c5ce7; border: none; color: white; border-radius: 8px; margin-top: 5px; cursor: pointer; }
        .section-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        #warning-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="warning-modal">
        <h2>⚠️ SECURITY ALERT</h2>
        <p>Auto-Clicker & Fake Referrals = Permanent Ban!</p>
        <button class="btn" onclick="acceptWarning()">I AGREE & START</button>
    </div>

    <div id="game-ui" style="display:none;">
        <h1 id="coin-disp">Coins: 0</h1>
        <button class="btn" onclick="handleTap()">TAP NINJA (+2)</button>

        <div class="section-grid">
            <div class="card">
                <h4>🎰 Spin</h4>
                <button class="btn" onclick="spinWheel()">Spin (100c)</button>
            </div>
            <div class="card">
                <h4>💰 Withdraw</h4>
                <button class="btn" style="background:#00b894;" onclick="handleWithdrawal()">Request Pay</button>
            </div>
        </div>

        <div class="card">
            <h3>🎯 Daily Tasks</h3>
            <button class="btn" onclick="playAdsgram('rewarded')">Video Ad (+300)</button>
            <button class="btn" onclick="playMonetag()">Premium Task (+300)</button>
        </div>
    </div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        
        // TUMHARI DETAILS
        const BOT_TOKEN = "8340157634:AAEMQQyxpgz4rb4u7kZWMVq3S6NSnixk0uI";
        const ADMIN_ID = "6076887996";
        
        let coins = 0;
        let lastTapTime = 0;

        function acceptWarning() { 
            document.getElementById('warning-modal').style.display = 'none'; 
            document.getElementById('game-ui').style.display = 'block';
            loadData();
        }

        function loadData() { WebApp.CloudStorage.getItem('coins', (e, v) => { if(v) coins = parseInt(v); updateUI(); }); }

        function handleTap() {
            if (Date.now() - lastTapTime < 250) return alert("❌ Auto-clicker detected!");
            lastTapTime = Date.now();
            coins += 2;
            WebApp.CloudStorage.setItem('coins', coins.toString());
            updateUI();
        }

        // WITHDRAWAL LOGIC
        async function handleWithdrawal() {
            if(coins < 1000) return alert("Minimum 1000 coins chahiye!");
            const name = WebApp.initDataUnsafe.user?.first_name || "User";
            const id = WebApp.initDataUnsafe.user?.id || "Unknown";
            
            const msg = `🔔 New Withdraw Request!\n👤 User: ${name}\n🆔 ID: ${id}\n💰 Amount: ${coins} coins`;
            
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${ADMIN_ID}&text=${encodeURIComponent(msg)}`);
            
            alert("✅ Request Admin ko bhej di gayi hai!");
            coins = 0;
            WebApp.CloudStorage.setItem('coins', '0');
            updateUI();
        }

        function spinWheel() {
            if (coins < 100) return alert("Kam coins!");
            coins -= 100;
            coins += Math.floor(Math.random() * 500);
            updateUI();
        }

        function playAdsgram(type) {
            const controller = window.Adsgram.init({ blockId: "35068" });
            controller.show().then(res => { if(res.done) { coins += 300; updateUI(); } });
        }

        function playMonetag() {
            // Monetag script function
            if(typeof show_11090557 !== 'undefined') {
                show_11090557('pop').then(() => { coins += 300; updateUI(); });
            } else { alert("Ad load ho rahi hai..."); }
        }

        function updateUI() { document.getElementById('coin-disp').innerText = "Coins: " + coins; }
    </script>
</body>
</html>
