<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0d0e15; color: white; text-align: center; font-family: sans-serif; }
        .btn { padding: 15px; margin: 10px; width: 80%; border-radius: 10px; border: none; background: #00b894; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Coins: <span id="coin-disp">0</span></h1>
    <h3>Balance: $<span id="usd-disp">0.0000</span></h3>
    <button class="btn" onclick="handleTap()">TAP HERE 🥷</button>
    <button class="btn" onclick="handleWithdrawal()">WITHDRAW ($2 MIN)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        let coins = 0;
        
        // Tumhari Details
        const BOT_TOKEN = "8340157634:AAEMQQyxpgz4rb4u7kZWMVq3S6NSnixk0uI";
        const CHAT_ID = "6076887996";

        function updateUI() {
            document.getElementById('coin-disp').innerText = coins;
            document.getElementById('usd-disp').innerText = (coins * 0.000001).toFixed(4);
        }

        function handleTap() {
            coins += 50000; // Testing ke liye fast coins
            updateUI();
        }

        function handleWithdrawal() {
            let usd = (coins * 0.000001);
            if (usd < 2.00) return alert("Minimum $2.00 required!");
            
            const name = tg.initDataUnsafe.user?.first_name || "User";
            const text = `💰 Withdraw Request!\n👤 ${name}\n🪙 Coins: ${coins}\n💵 Amount: $${usd.toFixed(4)}`;

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}`)
            .then(() => alert("Request Admin ko bhej di gayi hai!"));
        }
    </script>
</body>
</html>
