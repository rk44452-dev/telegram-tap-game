  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Adventure Pro - Full Features</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Orbitron', sans-serif; color: white; }
        body { background: #0b0c16; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 450px; margin: auto; height: 100vh; background: #080911; display: flex; flex-direction: column; }
        
        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .screen { display: none; width: 100%; text-align: center; }
        #home-screen { display: flex; }
        
        /* Spin Wheel Style */
        .wheel-container { width: 250px; height: 250px; border: 5px solid #ff9f43; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 20px 0; background: conic-gradient(#ff9f43 0deg 90deg, #2a1b54 90deg 180deg, #ff9f43 180deg 270deg, #2a1b54 270deg 360deg); transition: transform 4s ease-out; }
        
        .navbar { height: 70px; background: #0d0f1e; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2a1b54; }
        .nav-item { font-size: 10px; cursor: pointer; text-align: center; }
        .btn { background: #2a1b54; border: 1px solid #ff9f43; padding: 12px; width: 100%; border-radius: 10px; margin: 5px 0; cursor: pointer; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0b0c16; display: none; flex-direction: column; padding: 20px; z-index: 100; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="content">
        <div id="home-screen" class="screen">
            <div style="font-size: 50px;">🚀</div>
            <div style="font-size: 32px; color: #ff9f43; margin: 20px 0;" id="coins">0.00</div>
            <button class="btn" onclick="openOverlay('payout-screen')">Withdrawal Portal</button>
        </div>

        <div id="wheel-screen" class="screen">
            <h3>Lucky Spin</h3>
            <div class="wheel-container" id="wheel">SPIN</div>
            <button class="btn" onclick="spinWheel()">SPIN NOW</button>
        </div>

        <div id="game-screen" class="screen"><h3>🎮 Game Section</h3></div>
        <div id="task-screen" class="screen"><h3>✅ Daily Tasks</h3></div>
        <div id="refferal-screen" class="screen"><h3>👥 Referral</h3></div>
    </div>

    <div id="payout-screen" class="overlay">
        <h3>👛 Payout</h3>
        <input type="text" id="addr" placeholder="Enter Wallet Address" style="background:black; padding:15px; margin:20px 0; border:1px solid #333; color:white;">
        <button class="btn" onclick="confirmWithdraw()">Confirm</button>
        <button class="btn" onclick="closeOverlay()">Close</button>
    </div>

    <div class="navbar">
        <div class="nav-item" onclick="switchTab('home-screen')">🏠<br>Home</div>
        <div class="nav-item" onclick="switchTab('wheel-screen')">🎡<br>Wheel</div>
        <div class="nav-item" onclick="switchTab('refferal-screen')">👥<br>Referral</div>
        <div class="nav-item" onclick="switchTab('game-screen')">🎮<br>Game</div>
        <div class="nav-item" onclick="switchTab('task-screen')">✅<br>Task</div>
    </div>
</div>

<script>
    function switchTab(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
    }
    
    function openOverlay(id) { document.getElementById(id).style.display = 'flex'; }
    function closeOverlay() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }

    function spinWheel() {
        const wheel = document.getElementById('wheel');
        let randomDeg = Math.floor(Math.random() * 3600) + 360;
        wheel.style.transform = `rotate(${randomDeg}deg)`;
        setTimeout(() => alert("You won bonus points!"), 4000);
    }

    function confirmWithdraw() {
        const addr = document.getElementById('addr').value;
        if(!addr) return alert("Enter address!");
        alert("✅ Request Sent! (3 Days)");
        closeOverlay();
    }
</script>
</body>
</html>
