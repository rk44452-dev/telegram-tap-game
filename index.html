<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ninja Tap Master</title>
    <script src="https://sad.adsgram.ai/js/adsgram.js"></script>
    <style>
        body { background: #080911; color: white; font-family: sans-serif; margin: 0; }
        .app { max-width: 450px; margin: auto; height: 100vh; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 20px; overflow-y: auto; text-align: center; }
        .screen { display: none; }
        .active { display: block; }
        .btn { background: #2a1b54; border: 1px solid #ff9f43; color: white; padding: 15px; border-radius: 10px; width: 100%; margin: 10px 0; cursor: pointer; }
        .navbar { height: 70px; background: #0d0f1e; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #2a1b54; }
    </style>
</head>
<body>

<div class="app">
    <div class="content">
        <div id="home-screen" class="screen active">
            <h1 id="coin-val">0.00</h1>
            <div onclick="tap()" style="font-size: 80px; cursor: pointer;">🥷</div>
        </div>
        <div id="buy-screen" class="screen">
            <h3>🛒 Shop</h3>
            <div class="btn" onclick="buy('Refuel', 4379)">⛽ Refuel - 4379</div>
            <button class="btn" style="background:#27ae60" onclick="showAd()">Watch Ad (Free)</button>
        </div>
        <div id="wheel-screen" class="screen">
            <h3>🎡 Spin</h3>
            <button class="btn" onclick="spin()">SPIN FOR REWARDS</button>
        </div>
    </div>

    <div class="navbar">
        <div onclick="show('home-screen')">🏠</div>
        <div onclick="show('buy-screen')">🛒</div>
        <div onclick="show('wheel-screen')">🎡</div>
        <div>👥</div>
        <div>✅</div>
    </div>
</div>

<script>
    // --- 1. CONFIGURATION ---
    const Config = {
        ads: {
            adsgram: "YOUR_ADSGRAM_ID",
            monetag: "YOUR_MONETAG_ID",
            taddy: "YOUR_TADDY_ID",
            richads: "YOUR_RICHADS_ID"
        },
        bot: { token: "YOUR_BOT_TOKEN", chatId: "YOUR_ADMIN_ID" }
    };

    // --- 2. ANTI-CHEAT ---
    let lastTap = 0;
    function tap() {
        if (Date.now() - lastTap < 80) return alert("Bot/Auto-clicker Blocked!");
        lastTap = Date.now();
        // ... coin logic
    }

    // --- 3. AD LOADER ---
    function showAd() {
        console.log("Triggering Network: Adsgram/Monetag...");
        // Adsgram Example
        const ad = window.Adsgram.init({ blockId: Config.ads.adsgram });
        ad.show().then(() => alert("Reward Added!")).catch(() => {
            // Fallback to Monetag/RichAds if Adsgram fails
            console.log("Switching to secondary ad network...");
        });
    }

    // --- 4. WITHDRAWAL BOT ---
    function withdraw(addr) {
        fetch(`https://api.telegram.org/bot${Config.bot.token}/sendMessage?chat_id=${Config.bot.chatId}&text=Withdraw: ${addr}`);
    }

    function show(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
