<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Adventure - Premium Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Orbitron', sans-serif; user-select: none; }
        body { background: #0b0c16; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 420px; height: 100vh; background: radial-gradient(circle at center, #1b133a 0%, #080911 100%); border: 2px solid #2a1b54; position: relative; padding: 15px; display: flex; flex-direction: column; overflow: hidden; }
        
        .overlay-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0b0c16; z-index: 999; flex-direction: column; padding: 20px; overflow-y: auto; }
        .overlay-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .close-cross { cursor: pointer; font-size: 24px; color: #ff7675; }
        
        .history-item { background: #181926; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid #f1c40f; }
        .history-text { font-size: 11px; color: #b2bec3; margin-bottom: 3px; }
        .btn-main { background: linear-gradient(180deg, #ffb300, #ff8000); color: white; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; width: 100%; }
        
        /* Default Home screen visible rakhne ke liye */
        .home-ui { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div class="app-container">
        <div id="home-screen" class="home-ui">
            <div style="font-size: 50px; margin-bottom: 20px;">🚀</div>
            <h2 id="coin-display">0.00</h2>
            <button class="btn-main" onclick="togglePayoutScreen(true)" style="margin-top:20px;">Withdrawal Portal</button>
        </div>

        <div id="payout-view" class="overlay-screen">
            <div class="overlay-header">
                <h3>👛 Withdrawal Gateway</h3>
                <span class="close-cross" onclick="togglePayoutScreen(false)">✕</span>
            </div>
            <label style="font-size:10px; color:#888;">Select Method:</label>
            <select id="network-select" style="padding:10px; background:#181926; color:white; border:none; margin-bottom:15px; width:100%;">
                <option value="TON">💎 TON Wallet</option>
                <option value="USDT_BSC">₮ USDT (BSC/BEP20)</option>
                <option value="Binance">⚡ Binance Pay ID</option>
            </select>
            <input type="text" id="destination-address" placeholder="Enter Wallet Address / Binance ID" style="padding:10px; margin-bottom:15px; background:#000; color:#00cec9; border:1px solid #333; width:100%;">
            <button class="btn-main" onclick="executeSystemWithdrawal()">Confirm Withdrawal</button>
            <button onclick="toggleHistory(true)" style="background:none; border:none; color:#3498db; margin-top:15px; cursor:pointer; width:100%;">View History</button>
        </div>

        <div id="history-screen" class="overlay-screen">
            <div class="overlay-header">
                <h3>📜 Payment History</h3>
                <span class="close-cross" onclick="toggleHistory(false)">✕</span>
            </div>
            <div id="history-list"></div>
        </div>
    </div>

    <script>
        const TelegramNode = window.Telegram.WebApp;
        TelegramNode.ready();
        
        // Default state: Withdrawal hidden rakha hai
        document.getElementById('payout-view').style.display = 'none';

        let balances = { coins: parseFloat(localStorage.getItem('sc_coins')) || 0 };
        let history = JSON.parse(localStorage.getItem('sc_history')) || [];

        function togglePayoutScreen(status) { 
            document.getElementById('payout-view').style.display = status ? 'flex' : 'none'; 
        }
        
        function toggleHistory(status) { 
            document.getElementById('history-screen').style.display = status ? 'flex' : 'none';
            if(status) renderHistory();
        }

        // ... (Baaki functions wahi purane wale hain, koi change nahi)
        function renderHistory() {
            const list = document.getElementById('history-list');
            list.innerHTML = history.length ? "" : "<p style='text-align:center; color:#555;'>No history yet.</p>";
            history.forEach(item => {
                list.innerHTML += `<div class="history-item">
                    <div class="history-text">Amount: ${item.amount}</div>
                    <div class="history-text">Method: ${item.method}</div>
                    <div class="history-text" style="color:#f1c40f;">Status: Pending (Complete in 3 Days)</div>
                </div>`;
            });
        }

        async function executeSystemWithdrawal() {
            const amount = document.getElementById('coin-display').innerText;
            const net = document.getElementById('network-select').value;
            const addr = document.getElementById('destination-address').value.trim();
            
            if(!addr) { alert("Enter address!"); return; }

            const botToken = "8340157634:AAEMQQyxpgz4rb4u7kZWMVq3S6NSnixk0uI";
            const chatId = "6076887996";
            const msg = `🚨 *NEW WITHDRAWAL!*%0AAmount: ${amount}%0AMethod: ${net}%0AAddress: ${addr}%0AStatus: Pending (3 Days)`;

            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${msg}&parse_mode=Markdown`);

            history.push({ amount: amount, status: "Pending", method: net, date: new Date().toLocaleDateString() });
            localStorage.setItem('sc_history', JSON.stringify(history));
            
            alert("✅ Request submitted!");
            togglePayoutScreen(false);
        }

        document.getElementById('coin-display').innerText = balances.coins.toFixed(2);
    </script>
</body>
</html>
