<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Tap Pro</title>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="//libtl.com/sdk.js" data-zone="11090557" data-sdk="show_11090557" async></script>
    <style>
        body { background: #0d0e15; color: white; text-align: center; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        .btn { padding: 15px; width: 90%; background: #6c5ce7; border: none; color: white; border-radius: 10px; margin: 10px 0; font-weight: bold; }
        nav { position: fixed; bottom: 0; width: 100%; background: #1c1f2e; display: flex; justify-content: space-around; padding: 10px 0; font-size: 10px; border-top: 1px solid #333; }
        nav button { background: none; border: none; color: #a29bfe; font-size: 12px; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <h1>Coins: <span id="coin-disp">0</span></h1>
        <button class="btn" onclick="showAds()">📺 Watch Ads (+500 Coins)</button>
    </div>

    <div id="spin" class="page">
        <h1>Spin Wheel</h1>
        <button class="btn" onclick="spinWheel()">🎡 Spin (Cost 100)</button>
    </div>

    <div id="tasks" class="page">
        <h1>Daily Tasks</h1>
        <button class="btn" style="background:#f39c12;" onclick="alert('Task Completed!')">Follow Telegram Channel</button>
    </div>

    <div id="refer" class="page">
        <h1>Refer & Earn</h1>
        <p>Invite friends and earn 0.2$ per referral!</p>
        <button class="btn" onclick="shareRef()">🔗 Share My Referral Link</button>
    </div>

    <div id="withdraw" class="page">
        <h1>Withdraw Funds</h1>
        <input type="text" id="wallet" placeholder="Enter USDT Address" style="padding:10px; width:80%; border-radius:5px; margin-bottom:10px;">
        <button class="btn" style="background:#e74c3c;" onclick="requestWithdrawal()">💸 Submit Request</button>
    </div>

    <nav>
        <button onclick="showPage('home')">🏠 Home</button>
        <button onclick="showPage('spin')">🎡 Spin</button>
        <button onclick="showPage('tasks')">📋 Tasks</button>
        <button onclick="showPage('refer')">👥 Refer</button>
        <button onclick="showPage('withdraw')">💸 Withdraw</button>
    </nav>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        let coins = 0, lastClickTime = 0;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZHBTeIrVITbZSyGFkE5jeeO_rX_VIBpIPB7ihyGU76-3_N6I6YfU41X2k-jB2Ce6HbQ/exec";

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function isBot() {
            let now = Date.now();
            if (now - lastClickTime < 500) return true;
            lastClickTime = now;
            return false;
        }

        function spinWheel() {
            if (isBot()) return alert("⚠️ Auto-clicker detected!");
            if (coins < 100) return alert("Not enough coins!");
            coins -= 100;
            document.getElementById('coin-disp').innerText = coins;
            alert("Spinning...");
        }

        function showAds() {
            if (typeof show_11090557 !== 'undefined') {
                show_11090557().then(() => { coins += 500; document.getElementById('coin-disp').innerText = coins; });
            } else { alert("Ad loading..."); }
        }

        function shareRef() {
            const userId = WebApp.initDataUnsafe.user?.id || "USER_ID";
            const botLink = "http://t.me/Ninjatapgamebot/myapp?startapp=" + userId;
            if (navigator.share) {
                navigator.share({ title: 'Ninja Tap Pro', text: 'Earn money with me!', url: botLink });
            } else {
                navigator.clipboard.writeText(botLink);
                alert("Link copied: " + botLink);
            }
        }

        async function requestWithdrawal() {
            let wallet = document.getElementById('wallet').value;
            if(!wallet) return alert("Enter Wallet Address!");
            
            const data = { 
                name: WebApp.initDataUnsafe.user?.first_name, 
                id: WebApp.initDataUnsafe.user?.id, 
                coins: coins,
                referrals: 0, 
                amount: (coins / 100000).toFixed(2) + "$",
                method: "USDT",
                address: wallet
            };
            await fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
            alert("Request sent successfully!");
        }
    </script>
</body>
</html>
