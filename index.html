<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Tap Pro</title>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0d0e15; color: white; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        .card { background: #1c1f2e; padding: 15px; border-radius: 15px; margin: 10px; border: 1px solid #333; }
        .btn { padding: 15px; width: 90%; background: #6c5ce7; border: none; color: white; border-radius: 10px; margin: 10px 0; font-weight: bold; cursor: pointer; }
        .section { display: none; padding-top: 20px; }
        .section.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1c1f2e; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-item { color: #aaa; cursor: pointer; font-size: 12px; }
        .nav-item.active { color: #6c5ce7; }
        #ninja-img { font-size: 100px; cursor: pointer; user-select: none; }
    </style>
</head>
<body>

    <div id="game-ui">
        <div id="home-section" class="section active">
            <h1 id="coin-disp">Coins: 0</h1>
            <h2 id="energy-disp">Energy: 500/500</h2>
            <div id="ninja-img" onclick="handleTap()">🥷</div>
            <p>Tap on Ninja (+2 Coins)</p>
        </div>

        <div id="spin-section" class="section">
            <h3>🎰 Spin Wheel</h3>
            <div id="wheel-container" style="height:200px; display:flex; align-items:center; justify-content:center; background:#1c1f2e; margin:20px; border-radius:50%;">
                <span style="font-size:40px;">🎡</span>
            </div>
            <button class="btn" onclick="spinWheelPaid()">💰 Spin (500 Coins)</button>
        </div>

        <div id="referral-section" class="section">
            <h3>🔗 Invite Friends</h3>
            <div class="card">
                <p id="referral-link" style="word-break: break-all; background: #2a2f45; padding: 10px; border-radius: 8px;"></p>
                <button class="btn" onclick="copyReferral()">Copy Referral Link</button>
            </div>
        </div>

        <div id="tasks-section" class="section">
            <h3>🎯 Daily Tasks</h3>
            <button class="btn" onclick="watchAdForEnergy()">📺 Watch Ad for Energy</button>
        </div>

        <div id="withdrawal-section" class="section">
            <h3>💰 Withdraw</h3>
            <input type="text" id="wallet" placeholder="Wallet Address" style="padding:10px; width:80%; margin-bottom:10px;">
            <button class="btn" style="background:#00b894;" onclick="handleWithdrawal()">Request Withdrawal</button>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab(0)">🏠<br>Home</div>
        <div class="nav-item" onclick="switchTab(1)">🎰<br>Spin</div>
        <div class="nav-item" onclick="switchTab(2)">🔗<br>Refer</div>
        <div class="nav-item" onclick="switchTab(3)">📋<br>Tasks</div>
        <div class="nav-item" onclick="switchTab(4)">💰<br>Withdraw</div>
    </div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        
        let coins = 0, energy = 500;
        
        function updateUI() {
            document.getElementById('coin-disp').innerText = "Coins: " + coins;
            document.getElementById('energy-disp').innerText = "Energy: " + energy + "/500";
        }

        function handleTap() {
            if (energy <= 0) return alert("❌ No energy!");
            coins += 2;
            energy -= 1;
            updateUI();
        }

        function spinWheelPaid() {
            if (coins < 500) return alert("Not enough coins!");
            coins -= 500;
            updateUI();
            let win = Math.floor(Math.random() * 500);
            coins += win;
            updateUI();
            alert("🎉 You won " + win + " coins!");
        }

        function copyReferral() {
            const userId = WebApp.initDataUnsafe.user?.id || "USER_ID";
            const link = "https://t.me/ninjatapgamebot?start=" + userId;
            navigator.clipboard.writeText(link);
            alert("Link copied!");
        }

        function updateReferralLink() {
            const userId = WebApp.initDataUnsafe.user?.id || "USER_ID";
            document.getElementById('referral-link').innerText = "https://t.me/ninjatapgamebot?start=" + userId;
        }

        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.section')[tab].classList.add('active');
        }

        window.onload = () => { updateUI(); updateReferralLink(); };
    </script>
</body>
</html>
