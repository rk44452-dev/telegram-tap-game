<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Tap Pro</title>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="//libtl.com/sdk.js" data-zone="11090557" data-sdk="show_11090557" async></script>
    
    <script src="https://sdk.taddy.pro/web/taddy.min.js" data-pub-id="4e95d659cb46669dbe7d1ac3cf15bb86" async></script>
    
    <script src="https://richinfo.co/richpartners/in-page/js/richads-ob.js?pubid=1013762&siteid=398682" async></script>

    <style>
        body { background: #0d0e15; color: white; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; padding-bottom: 80px; }
        .card { background: #1c1f2e; padding: 15px; border-radius: 15px; margin: 10px 0; border: 1px solid #333; }
        .btn { padding: 12px; width: 100%; background: #6c5ce7; border: none; color: white; border-radius: 8px; margin-top: 8px; cursor: pointer; font-weight: bold; }
        .section { display: none; }
        .section.active { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1c1f2e; border-top: 1px solid #333; display: flex; justify-content: space-around; padding: 8px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #aaa; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #6c5ce7; }
        #ninja-img { width: 180px; height: 180px; font-size: 120px; cursor: pointer; margin: 15px auto; transition: transform 0.1s; }
        #ninja-img:active { transform: scale(0.85); }
        #wheel-container { width: 260px; height: 260px; margin: 20px auto; position: relative; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; background: conic-gradient(#e74c3c 0deg 45deg, #f1c40f 45deg 90deg, #2ecc71 90deg 135deg, #3498db 135deg 180deg, #9b59b6 180deg 225deg, #e67e22 225deg 270deg, #e74c3c 270deg 315deg, #f1c40f 315deg 360deg); border: 15px solid #ffd700; box-shadow: 0 0 30px #ffd700; transition: transform 4s cubic-bezier(0.25, 0.1, 0.25, 1); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 50px; z-index: 10; }
        .withdraw-option { background: #2d3436; padding: 10px; border-radius: 8px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="warning-modal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; display:flex; flex-direction:column; justify-content:center; align-items:center;">
        <h2>⚠️ SECURITY ALERT</h2>
        <p>Auto-Clicker & Fake Referrals = Permanent Ban!</p>
        <button class="btn" onclick="acceptWarning()">I AGREE & START</button>
    </div>

    <div id="game-ui" style="display:none;">

        <div id="earn-section" class="section active">
            <h1 id="coin-disp">Coins: 0</h1>
            <h2 id="energy-disp">Energy: 500/500</h2>
            <div id="ninja-img" onclick="handleTap()">🥷</div>
            <p style="margin:5px; font-size:16px;">Tap on Ninja (+2 Coins)</p>

            <div class="card">
                <h4>🎰 Spin Wheel</h4>
                <div id="wheel-container">
                    <div class="pointer">▼</div>
                    <div id="wheel"></div>
                </div>
                <button class="btn" onclick="spinWheelPaid()">💰 Spin (100 Coins)</button>
                <button class="btn" style="background:#00b894;" onclick="spinWheelFree()">📺 Free Spin</button>
            </div>

            <div class="card">
                <h4>💰 Withdrawal</h4>
                <p style="color:#00ff9d; font-size:14px;">Min: 20,000 Coins</p>
                <button class="btn" style="background:#00b894;" onclick="handleWithdrawal()">Request Withdrawal</button>
            </div>
        </div>

        <div id="tasks-section" class="section">
            <h3>🎯 Daily Tasks</h3>
            <div class="card">
                <button class="btn" onclick="watchAdForEnergy()">📺 AdsGram Energy</button>
                <button class="btn" onclick="playMonetag()">💰 Monetag (+300)</button>
                <button class="btn" onclick="playRichads()">🔥 Richads (+300)</button>
                <button class="btn" onclick="playTaddy()">⭐ Taddy.pro (+300)</button>
            </div>
        </div>

        <div id="dice-section" class="section">
            <h3>🔋 Energy Refill</h3>
            <div class="card">
                <button class="btn" onclick="watchAdForEnergy()">📺 Watch Ad → Full Energy</button>
                <button class="btn" onclick="buyEnergy()">💰 200 Coins → Full Energy</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="switchTab(0)" id="nav-tasks">📋<br>TASKS</div>
        <div class="nav-item active" onclick="switchTab(1)" id="nav-earn">▶️<br>EARN</div>
        <div class="nav-item" onclick="switchTab(2)" id="nav-dice">🎲<br>DICE</div>
    </div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        let coins = 0, energy = 500;
        
        function acceptWarning() { 
            document.getElementById('warning-modal').style.display = 'none'; 
            document.getElementById('game-ui').style.display = 'block';
            loadProgress();
        }

        function loadProgress() {
            WebApp.CloudStorage.getItem('coins', (e, v) => { if(v) coins = parseInt(v); updateUI(); });
            WebApp.CloudStorage.getItem('energy', (e, v) => { if(v) energy = parseInt(v); updateUI(); });
        }

        function saveProgress() {
            WebApp.CloudStorage.setItem('coins', coins.toString());
            WebApp.CloudStorage.setItem('energy', energy.toString());
        }

        function handleTap() {
            if (energy <= 0) return alert("Energy khatam!");
            coins += 2; energy -= 1; saveProgress(); updateUI();
        }

        function startWheelAnimation() {
            const wheel = document.getElementById('wheel');
            const randomDegrees = Math.floor(Math.random() * 360) + 2880;
            wheel.style.transform = `rotate(${randomDegrees}deg)`;
            setTimeout(() => {
                const prizes = [150, 250, 300, 400, 500, 600, 750, 1000];
                const win = prizes[Math.floor(Math.random() * prizes.length)];
                coins += win; // Coins add ho gaye!
                saveProgress();
                updateUI();
                alert(`🎉 Jackpot! ${win} Coins jeet gaye!`);
            }, 4200);
        }

        function spinWheelPaid() {
            if (coins < 100) return alert("100 Coins chahiye!");
            coins -= 100;
            startWheelAnimation();
        }

        function spinWheelFree() {
            const controller = window.Adsgram.init({ blockId: "35068" });
            controller.show().then(res => { if(res.done) startWheelAnimation(); });
        }

        function updateUI() {
            document.getElementById('coin-disp').innerText = `Coins: ${coins}`;
            document.getElementById('energy-disp').innerText = `Energy: ${energy}/500`;
        }

        function switchTab(tab) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            if (tab === 0) document.getElementById('tasks-section').classList.add('active');
            else if (tab === 1) document.getElementById('earn-section').classList.add('active');
            else if (tab === 2) document.getElementById('dice-section').classList.add('active');
        }
    </script>
</body>
</html>
