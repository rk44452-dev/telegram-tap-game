<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Tap Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://sad.adsgram.ai/js/sad.min.js"></script>
    <script src="//libtl.com/sdk.js" data-zone="11090557" data-sdk="show_11090557" async></script>
    <script src="https://richinfo.co/richpartners/in-page/js/richads-ob.js?pubid=1013762&siteid=398682" async></script>
    <script src="https://taddy.pro/sdk.js?id=4e95d659cb46669dbe7d1ac3cf15bb86"></script>
    <style>
        body { background: #0d0e15; color: white; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .btn { padding: 15px; width: 90%; background: #6c5ce7; border: none; color: white; border-radius: 10px; margin: 10px 0; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1c1f2e; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #aaa; cursor: pointer; font-size: 11px; }
        .nav-item.active { color: #6c5ce7; }
        #ninja-img { font-size: 100px; cursor: pointer; transition: transform 0.1s; }
        #wheel-img { width: 280px; transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
    </style>
</head>
<body>

    <div id="home-section" class="page active">
        <h1 id="coin-disp">Coins: 0</h1>
        <div id="ninja-img" onclick="handleTap()">🥷</div>
        <p>Tap to Earn (+2 Coins)</p>
    </div>

    <div id="spin-section" class="page">
        <h3>🎰 Spin Wheel</h3>
        <img id="wheel-img" src="wheel.jpg" alt="Wheel">
        <button class="btn" onclick="spinWheel()">💰 Spin (500 Coins)</button>
    </div>

    <div id="referral-section" class="page">
        <h3>🔗 Referral Link</h3>
        <p id="ref-link" style="background:#2a2f45; padding:10px; border-radius:8px;"></p>
        <button class="btn" onclick="copyRef()">Copy Link</button>
    </div>

    <div id="tasks-section" class="page">
        <h3>🎯 Daily Tasks</h3>
        <button class="btn" onclick="showAdsGram()">📺 AdsGram (500)</button>
        <button class="btn" onclick="show_11090557().then(() => addCoins(300))">💰 Monetag (300)</button>
        <button class="btn" onclick="alert('RichAds Active')">🔥 RichAds (300)</button>
        <button class="btn" onclick="alert('Taddy Active')">⭐ Taddy (300)</button>
    </div>

    <div id="withdrawal-section" class="page">
        <h3>💰 Withdraw</h3>
        <input type="text" id="wallet" placeholder="Wallet Address" style="padding:10px; width:80%; border-radius:5px;">
        <button class="btn" style="background:#00b894;" onclick="handleWithdrawal()">Submit Request</button>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage(0)">🏠 Home</div>
        <div class="nav-item" onclick="showPage(1)">🎰 Spin</div>
        <div class="nav-item" onclick="showPage(2)">🔗 Refer</div>
        <div class="nav-item" onclick="showPage(3)">📋 Tasks</div>
        <div class="nav-item" onclick="showPage(4)">💰 Withdraw</div>
    </div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        let coins = 0, lastTap = 0;
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyZHBTeIrVITbZSyGFkE5jeeO_rX_VIBpIPB7ihyGU76-3_N6I6YfU41X2k-jB2Ce6HbQ/exec";

        function addCoins(val) { coins += val; WebApp.CloudStorage.setItem('coins', coins.toString()); document.getElementById('coin-disp').innerText = "Coins: " + coins; }

        function handleTap() {
            if (Date.now() - lastTap < 2000) return alert("⚠️ Wait 2 seconds!");
            lastTap = Date.now();
            addCoins(2);
        }

        function spinWheel() {
            let lastSpin = parseInt(WebApp.CloudStorage.getItem('lastSpin') || '0');
            if (Date.now() - lastSpin < 30 * 60 * 1000) return alert("⏳ Wait 30 mins!");
            if (coins < 500) return alert("Need 500 coins!");
            
            coins -= 500;
            const wheel = document.getElementById('wheel-img');
            wheel.style.transform = `rotate(${Math.random()*3600 + 3600}deg)`;
            
            const prizes = [50, 100, 100, 200, 200, 250, 300, 400, 500, 609, 650, 700, 800, 906, 950, 1000];
            const win = prizes[Math.floor(Math.random() * prizes.length)];

            setTimeout(() => { 
                addCoins(win); 
                WebApp.CloudStorage.setItem('lastSpin', Date.now().toString()); 
                alert("You won " + win + " coins!"); 
            }, 4000);
        }

        async function handleWithdrawal() {
            let addr = document.getElementById('wallet').value;
            if(!addr) return alert("Enter address!");
            await fetch(SCRIPT_URL, {method:"POST", mode:"no-cors", body:JSON.stringify({name: WebApp.initDataUnsafe.user?.first_name, coins: coins, address: addr})});
            alert("Request sent!");
        }

        function showPage(id) { 
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.querySelectorAll('.page')[id].classList.add('active'); 
            document.querySelectorAll('.nav-item')[id].classList.add('active'); 
        }

        function copyRef() { navigator.clipboard.writeText("https://t.me/ninjatapgamebot?startapp=" + (WebApp.initDataUnsafe.user?.id || "USER")); alert("Copied!"); }
        
        WebApp.CloudStorage.getItem('coins', (e, v) => { coins = parseInt(v) || 0; document.getElementById('coin-disp').innerText = "Coins: " + coins; });
        document.getElementById('ref-link').innerText = "https://t.me/ninjatapgamebot?startapp=" + (WebApp.initDataUnsafe.user?.id || "USER");
    </script>
</body>
</html>
