<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Tap Pro</title>
  <script src="https://sad.adsgram.ai/js/adsgram.js"></script>
<script>(function(s,u,z,p){s.src=u;s.setAttribute('data-zone',11090557);p.appendChild(s);})(document.createElement('script'),'https://inklinkor.com/tag.min.js',11090557,document.body||document.documentElement)</script>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0d0e15; color: white; font-family: sans-serif; text-align: center; margin: 0; padding-bottom: 80px; }
        .page { display: none; padding: 20px; }
        .page.active { display: block; }
        .btn { padding: 15px; width: 90%; background: #6c5ce7; border: none; color: white; border-radius: 10px; margin: 10px 0; font-weight: bold; cursor: pointer; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: #1c1f2e; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: #aaa; cursor: pointer; font-size: 11px; }
        .nav-item.active { color: #6c5ce7; }
        #wheel-img { width: 280px; transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99); }
    </style>
</head>
<body>
 <div id="home-section" class="page active">
        <h1 id="coin-disp">Coins: 0</h1>
        <div onclick="handleTap()" style="font-size:100px; cursor:pointer;">🥷</div>
        <p>Tap to Earn (+2 Coins)</p>
    </div>
<div id="spin-section" class="page">
        <h3>🎰 Spin Wheel</h3>
        <img id="wheel-img" src="wheel.jpg" alt="Wheel">
        <button class="btn" onclick="spinWheel()">💰 Spin (500 Coins)</button>
    </div>
<div id="tasks-section" class="page">
        <h3>🎯 Daily Tasks</h3>
        <button class="btn" onclick="addCoins(300)">📺 Watch Ad (+300 Coins)</button>
    </div>
<div id="withdrawal-section" class="page">
        <h3>💰 Withdraw Coins</h3>
        <p>Minimum: 10,000 Coins</p>
        <div style="text-align: left; background: #1c1f2e; padding: 15px; border-radius: 10px; margin: 10px 0;">
            <p>Select Method:</p>
            <input type="radio" name="method" value="USDT(BSC)" checked> USDT (BSC)<br>
            <input type="radio" name="method" value="Binance Pay"> Binance Pay<br>
            <input type="radio" name="method" value="TON"> TON
        </div>
        <input type="text" id="wallet" placeholder="Wallet Address" style="padding:10px; width:80%; border-radius:5px;">
        <button class="btn" style="background:#00b894;" onclick="handleWithdrawal()">Submit Request</button>
    </div>
 <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage(0)">🏠 Home</div>
        <div class="nav-item" onclick="showPage(1)">🎰 Spin</div>
        <div class="nav-item" onclick="showPage(2)">🎯 Tasks</div>
        <div class="nav-item" onclick="showPage(3)">💰 Withdraw</div>
    </div>
<script>
    const WebApp = window.Telegram.WebApp;
    WebApp.ready();
 let coins = 0;
 // Telegram Cloud se Data Load karo
    WebApp.CloudStorage.getItem('coins', (err, value) => {
        if (!err && value) {
            coins = parseInt(value);
            document.getElementById('coin-disp').innerText = "Coins: " + coins;
        }
    });

    // Cloud pe Data Save karne wala function
    function updateUI() {
        document.getElementById('coin-disp').innerText = "Coins: " + coins;
        WebApp.CloudStorage.setItem('coins', coins.toString());
    }
// Tapping Logic
    function handleTap() { 
        coins += 2; 
        updateUI(); 
    }
// Tasks (Watch Ad)
    function addCoins(val) { 
        coins += val; 
        updateUI(); 
        alert("✅ " + val + " coins added!");
    }
// Spin Logic
     // 1. Adsgram Initialization
    const AdController = window.Adsgram.init({ blockId: "35068" });

    // 2. Ad dikhane ka function
    function showAds() {
        AdController.show().then((result) => {
            if(result.done) {
                coins += 300; 
                updateUI();
                alert("✅ Ad dekhi! 300 coins mil gaye.");
            }
        }).catch((err) => {
            alert("❌ Ad load nahi ho payi: " + err);
        });
    }
    // 3. Spin Wheel Logic
    function spinWheel() {
        if (coins < 500) {
            let watchFree = confirm("❌ Coins kam hain! Free spin ke liye Ad dekhein?");
            if (watchFree) {
                showAds(); // Yahan ad chalegi
            }
            return;
        }
          // Coins deduct karo
        coins -= 500;
        updateUI();
         const wheel = document.getElementById('wheel-img');
        // Wheel ghumao
        wheel.style.transform = `rotate(${Math.random()*3600 + 3600}deg)`;
        
        setTimeout(() => {
            let prizes = [50, 100, 200, 500, 1000];
            let win = prizes[Math.floor(Math.random()*prizes.length)];
            coins += win;
            updateUI();
            alert("🎉 Mubarak ho! Aapne " + win + " coins jeete.");
        }, 4000);
    }
 // Withdrawal Logic
   function handleWithdrawal() {
    let addr = document.getElementById('wallet').value;
    // Yeh check karta hai ki user ne kaunsa method select kiya hai
    let method = document.querySelector('input[name="method"]:checked').value;
    
    if(!addr) return alert("Enter address!");
    if(coins < 10000) return alert("Min 10,000 coins required!");

    // Yahan apna Google Web App URL paste karo (jo tumne banaya hoga)
    let url = "https://script.google.com/macros/s/AKfycbzHBTeIRVITbZSyGFkE5jee0_rX_VIBpIPB7ihyGU76-3_N6I6YfU41X2k-jB2Ce6HbQ/exec"; 

    fetch(url, {
        method: 'POST',
        body: JSON.stringify({
            name: WebApp.initDataUnsafe.user?.first_name || "User",
            coins: coins,
            method: method,
            address: addr
        })
    }).then(() => {
        alert("✅ Request submitted successfully! We will contact you.");
    }).catch(err => alert("Error: " + err));
}
    // Navigation
    function showPage(id) {
        document.querySelectorAll('.page').forEach((p, i) => p.classList.toggle('active', i === id));
        document.querySelectorAll('.nav-item').forEach((n, i) => n.classList.toggle('active', i === id));
    }
</script>
</body>
</html>
