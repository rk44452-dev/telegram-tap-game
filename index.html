<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Tap & Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800&display=swap" rel="stylesheet">
    
    <!-- TELEGRAM WEB APP SDK ONLY -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- OFFICIAL MONETAG SMART TAG INTEGRATION -->
    <script>(function(s,u,z,p){s.src=u,s.setAttribute('data-zone',z),p.appendChild(s);})(document.createElement('script'),'https://iclickcdn.com/tag.min.js',11090557,document.body||document.documentElement)</script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            user-select: none;
        }

        body {
            background: #0d0e15;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            background: radial-gradient(circle at center, #1e1233 0%, #0d0e15 100%);
            border: 2px solid #391c6d;
            position: relative;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-box {
            font-size: 11px;
            color: #a29bfe;
        }

        .stat-val {
            font-size: 14px;
            color: #00cec9;
            font-weight: bold;
        }

        .score-board {
            text-align: center;
            margin-top: 15px;
        }

        .coin-balance {
            font-size: 36px;
            color: #fdcb6e;
            text-shadow: 0 0 20px rgba(253, 203, 110, 0.5);
            margin-bottom: 2px;
        }

        .usd-balance {
            font-size: 18px;
            color: #2ecc71;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
        }

        .click-area {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        .character-glow {
            width: 180px;
            height: 180px;
            background: rgba(0, 206, 201, 0.1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0, 206, 201, 0.2);
            border: 2px solid #00cec9;
            cursor: pointer;
            transition: transform 0.05s;
        }

        .character-glow:active {
            transform: scale(0.92);
            background: rgba(0, 206, 201, 0.2);
        }

        .character-emoji {
            font-size: 100px;
            filter: drop-shadow(0 0 10px #00cec9);
        }

        .energy-section {
            width: 100%;
            margin-bottom: 15px;
        }

        .energy-text {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 5px;
            color: #dfe6e9;
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: #2d3436;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .progress-bar-fill {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #00cec9, #0984e3);
            transition: width 0.1s ease;
        }

        .wallet-container {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 15px;
        }

        .wallet-title {
            font-size: 11px;
            color: #a29bfe;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .wallet-select {
            width: 100%;
            padding: 10px;
            background: #171821;
            color: white;
            border: 1px solid #391c6d;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            margin-bottom: 10px;
            outline: none;
        }

        .input-box {
            display: none;
            margin-bottom: 10px;
        }

        .dynamic-input {
            width: 100%;
            padding: 10px;
            background: #0d0e15;
            color: #00cec9;
            border: 1px solid #391c6d;
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            outline: none;
        }

        .action-container {
            display: flex;
            gap: 10px;
        }

        .game-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
        }

        .btn-ad {
            background: linear-gradient(135deg, #d63031, #e17055);
            box-shadow: 0 4px 10px rgba(214, 48, 49, 0.3);
        }

        .btn-withdraw {
            background: linear-gradient(135deg, #00b894, #00cec9);
            box-shadow: 0 4px 10px rgba(0, 184, 148, 0.3);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="top-bar">
            <div class="stat-box">Rate<br><span class="stat-val">10K = $1</span></div>
            <div class="stat-box" style="text-align: right;">Rank<br><span class="stat-val">Elite Ninja</span></div>
        </div>

        <div class="score-board">
            <div class="coin-balance">🪙 <span id="coin-count">0</span></div>
            <div class="usd-balance">≈ $<span id="usd-count">0.00</span></div>
        </div>

        <div class="click-area">
            <div class="character-glow" onclick="handleTap(event)">
                <div class="character-emoji">🥷</div>
            </div>
        </div>

        <div class="energy-section">
            <div class="energy-text">
                <span>⚡ Energy</span>
                <span><span id="energy-count">100</span>/100</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="energy-bar"></div>
            </div>
        </div>

        <div class="wallet-container">
            <div class="wallet-title">👛 Choose Payout Method</div>
            <select id="wallet-select" class="wallet-select" onchange="handleSelectChange()">
                <option value="none">-- Choose Option --</option>
                <option value="UPI">🇮🇳 UPI (Paytm/PhonePe/GPay)</option>
                <option value="Tonkeeper">💎 Tonkeeper Wallet</option>
                <option value="Telegram Wallet">✈️ Telegram Wallet</option>
            </select>

            <div id="payout-input-container" class="input-box">
                <input type="text" id="payout-address" class="dynamic-input" placeholder="">
            </div>

            <div class="action-container">
                <button class="game-btn btn-ad" id="ad-btn" onclick="watchAdToRefill()">📺 Refill (Ad)</button>
                <button class="game-btn btn-withdraw" id="withdraw-btn" onclick="handleWithdrawal()">💰 Withdraw</button>
            </div>
        </div>
    </div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        WebApp.expand();

        const userTelegramName = WebApp.initDataUnsafe.user ? WebApp.initDataUnsafe.user.first_name : "Test User";
        const userTelegramID = WebApp.initDataUnsafe.user ? WebApp.initDataUnsafe.user.id : "123456";

        let coins = 0;
        let energy = 100;
        const CONVERSION_RATE = 10000; 
        const MIN_WITHDRAW_USD = 5;    

        let lastTapTime = 0;
        const MAX_SPEED_LIMIT = 60; 

        function handleTap(event) {
            const currentTime = Date.now();
            if (lastTapTime !== 0) {
                const currentInterval = currentTime - lastTapTime;
                if (currentInterval < MAX_SPEED_LIMIT) {
                    alert("⚠️ Anti-Cheat Triggered!");
                    return; 
                }
            }
            lastTapTime = currentTime;

            if (energy > 0) {
                coins += 5; 
                energy -= 2; 
                if (energy < 0) energy = 0;
                updateUI();
            } else {
                alert("Out of Energy! Tap 'Refill' to view an ad.");
            }
        }

        function handleSelectChange() {
            const selectedOpt = document.getElementById('wallet-select').value;
            const inputContainer = document.getElementById('payout-input-container');
            const inputField = document.getElementById('payout-address');
            
            if (selectedOpt === 'none') {
                inputContainer.style.display = 'none';
            } else {
                inputContainer.style.display = 'block';
                if(selectedOpt === 'UPI') {
                    inputField.placeholder = "Enter UPI ID (e.g., username@okaxis)";
                } else {
                    inputField.placeholder = "Enter TON Wallet Address";
                }
            }
        }

        // MONETAG DIRECT REWARD SYSTEM
        function watchAdToRefill() {
            const adBtn = document.getElementById('ad-btn');
            adBtn.innerText = "Loading Monetag Ad...";
            adBtn.disabled = true;

            // Monetag dynamic tag initialization trigger
            if (typeof show_11090557 === 'function') {
                show_11090557().then(() => {
                    energy = 100;
                    updateUI();
                    alert('🎉 Success! Monetag Ad complete, energy full!');
                }).catch(() => {
                    alert('Ad loading error or skipped.');
                }).finally(() => {
                    adBtn.innerText = "📺 Refill (Ad)";
                    adBtn.disabled = false;
                });
            } else {
                // Fallback tag action if script takes time to load in browser
                energy = 100;
                updateUI();
                adBtn.innerText = "📺 Refill (Ad)";
                adBtn.disabled = false;
            }
        }

        function handleWithdrawal() {
            const selectedMethod = document.getElementById('wallet-select').value;
            const addressValue = document.getElementById('payout-address').value.trim();
            const currentUSD = coins / CONVERSION_RATE;

            if (selectedMethod === "none" || addressValue === "") {
                alert("Details enter karein!");
                return;
            }

            if (currentUSD < MIN_WITHDRAW_USD) {
                alert(`Min limit $${MIN_WITHDRAW_USD} hai.`);
                return;
            }

            const urlParams = new URLSearchParams(window.location.search);
            let googleScriptID = urlParams.get('sheet');
            
            if(!googleScriptID) {
                googleScriptID = "AKfycbxi_TEST_URL_REPLACE_IF_NEEDED"; 
            }

            const googleScriptURL = "https://script.google.com/macros/s/" + googleScriptID + "/exec";

            if (googleScriptID.includes("TEST_URL")) {
                alert("Link me ?sheet=YOUR_ID zaroor lagana BotFather me.");
                return;
            }

            const wBtn = document.getElementById('withdraw-btn');
            wBtn.innerText = "Processing...";
            wBtn.disabled = true;

            const payload = {
                tgName: userTelegramName,
                tgId: userTelegramID,
                coinAmount: coins,
                usdAmount: currentUSD.toFixed(2),
                method: selectedMethod,
                payoutDetails: addressValue
            };

            fetch(googleScriptURL, {
                method: 'POST',
                mode: 'no-cors',
                cache: 'no-cache',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert(`🎉 Success! Request submitted.`);
                coins = 0; 
                updateUI();
            })
            .catch(() => {
                alert("Server Error.");
            })
            .finally(() => {
                wBtn.innerText = "💰 Withdraw";
                wBtn.disabled = false;
            });
        }

        function updateUI() {
            document.getElementById('coin-count').innerText = coins.toLocaleString();
            document.getElementById('energy-count').innerText = energy;
            document.getElementById('energy-bar').style.width = energy + "%";
            let usdValue = coins / CONVERSION_RATE;
            document.getElementById('usd-count').innerText = usdValue.toFixed(2);
        }

        setInterval(() => {
            if (energy < 100) {
                energy += 1;
                updateUI();
            }
        }, 12000);
    </script>
</body>
</html>
